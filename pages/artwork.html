<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=blog.html?tags=artwork">
    <script>
        (function () {
            const current = new URL(window.location.href);
            const blogUrl = new URL('blog.html', current.href);

            const existingTags = (current.searchParams.get('tags') || current.searchParams.get('tag') || '')
                .split(',')
                .map(tag => tag.trim())
                .filter(Boolean);

            const mergedTags = Array.from(new Set(['artwork', ...existingTags]));
            blogUrl.searchParams.set('tags', mergedTags.join(','));

            const view = current.searchParams.get('view');
            if (view) {
                blogUrl.searchParams.set('view', view);
            }

            window.location.replace(`${blogUrl.pathname}${blogUrl.search}${current.hash}`);
        })();
    </script>
</head>
<body>
    <p><a href="blog.html?tags=artwork">블로그 아트워크 보기로 이동</a></p>
</body>
</html>
