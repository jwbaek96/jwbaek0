<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포스트 - JW.BAEK Blog</title>
    <link rel="shortcut icon" href="../assets/Vector.png">
    <link rel="icon" href="../assets/Vector.png" sizes="96x96" type="image/png">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="JW.BAEK의 블로그 포스트">
    <meta name="keywords" content="블로그, 아티스트, 웹개발, 인터랙티브미디어, 렌티큘러아트">
    <meta name="author" content="JW.BAEK">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="포스트 - JW.BAEK Blog">
    <meta property="og:description" content="JW.BAEK의 블로그 포스트">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://jwbaek96.github.io/blog1/post.html">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../styles/core/base.css">
    <link rel="stylesheet" href="../styles/shared/header.css">
    <link rel="stylesheet" href="../styles/pages/blog.css">
    <link rel="stylesheet" href="../styles/pages/post.css">
    <link rel="stylesheet" href="../styles/pages/comments.css">
    <link rel="stylesheet" href="../styles/shared/footer.css">
    <link rel="stylesheet" href="../styles/shared/floating-actions.css?v=20260625">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/0470599ade.js" crossorigin="anonymous"></script>

    <!-- Icon meta js -->
    <script src="../scripts/shared/head-meta.js"></script>
</head>
<body class="post-page">
    <!-- Header will be inserted by header-component.js -->
    <div id="header-placeholder"></div>
    
    <!-- Mobile Sidebar will be inserted by header-component.js -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
    <main class="main">
        <!-- Back to Blog Button -->
        <div class="container">
            <div class="back-to-blog">
                <a href="blog.html" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    back
                </a>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-container">
            <div class="loading-spinner">
                <!-- <div class="spinner"></div> -->
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="error-container" style="display: none;">
            <div class="error-content">
                <h2>포스트를 찾을 수 없습니다</h2>
                <p>요청하신 포스트가 존재하지 않거나 삭제되었습니다.</p>
                <div class="error-actions">
                    <a href="blog.html" class="btn btn-primary">블로그로 돌아가기</a>
                    <button onclick="location.reload()" class="btn btn-secondary">다시 시도</button>
                </div>
            </div>
        </div>

        <!-- Post Content -->
        <article id="postContent" class="post-article" style="display: none;">
            <div class="container">
                <!-- Post Header -->
                <div class="post-header">
                    <div class="post-meta">
                        <span class="post-private-label" id="postPrivateLabel" style="display: none;">🔒</span>
                        <span class="post-date" id="postDate"></span>
                        <span class="post-read-time" id="postReadTime"></span>
                        
                        <!-- Admin Actions (관리자만 표시) -->
                        <div class="post-admin-actions" id="postAdminActions" style="display: none;">
                            <div class="admin-actions-wrapper">
                                <button class="admin-more-btn" onclick="toggleAdminActions(this)">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="1"></circle>
                                        <circle cx="12" cy="5" r="1"></circle>
                                        <circle cx="12" cy="19" r="1"></circle>
                                    </svg>
                                </button>
                                <div class="admin-actions-menu">
                                    <button class="admin-action-btn edit-btn" onclick="editCurrentPost()">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="m18 2 4 4-14 14H4v-4L18 2z"></path>
                                        </svg>
                                        수정
                                    </button>
                                    <button class="admin-action-btn delete-btn" onclick="deleteCurrentPost()">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="3,6 5,6 21,6"></polyline>
                                            <path d="m19,6v14a2,2 0 0,1-2,2H7a2,2 0 0,1-2-2V6m3,0V4a2,2 0 0,1 2,2v2"></path>
                                        </svg>
                                        삭제
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="post-title-section">
                        <h1 class="post-title" id="postTitle"></h1>
                    </div>
                    
                </div>
                
                <!-- Post Body -->
                <div class="post-body">
                    <div class="post-content" id="postContentBody">
                        <!-- 포스트 내용이 동적으로 추가됩니다 -->
                    </div>
                </div>
                
                <!-- Post Footer -->
                <div class="post-footer">
                    <!-- Share Buttons -->
                    <div class="post-share">
                        <!-- <h3>공유하기</h3> -->
                        <div class="share-buttons">
                            <button class="share-btn" id="copyUrl" title="링크 복사">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                                    <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
                                </svg>
                                <div class="copied-tooltip">Copied!</div>
                            </button>
                                <!-- <button class="share-btn" id="shareTwitter" title="트위터 공유">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/>
                                    </svg>
                                </button>
                                <button class="share-btn" id="shareFacebook" title="페이스북 공유">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
                                    </svg>
                                </button> -->
                        </div>
                    </div>
                    <div class="post-tags" id="postTags">
                        <!-- 태그들이 동적으로 추가됩니다 -->
                    </div>
                    
                    <!-- Navigation -->
                    <div class="post-navigation">
                        <a id="nextPost" class="nav-post nav-next" style="display: none;">
                            <!-- <span class="nav-label">다음 포스트</span> -->
                            <span class="nav-label">&larr; Next</span>
                            <span class="nav-title"></span>
                        </a>
                        <a id="prevPost" class="nav-post nav-prev" style="display: none;">
                            <span class="nav-title"></span>
                            <!-- <span class="nav-label">이전 포스트</span> -->
                            <span class="nav-label">Prev &rarr;</span>
                        </a>
                    </div>
                </div>
            </div>
        </article>

        <!-- Comments Section -->
        <section id="commentsSection" class="comments-section">
            <div class="container">
                <!-- 댓글 헤더 -->
                <div class="comments-header">
                    <h3>댓글 <span class="comment-count" id="commentCount">(0)</span></h3>
                </div>
                
                <!-- 댓글 목록 -->
                <div class="comments-list" id="commentsList">
                    <!-- 댓글들이 동적으로 추가됩니다 -->
                </div>
                
                <!-- 댓글 작성 폼 -->
                <div class="comment-form">
                    <!-- <div class="anti-spam-notice">
                        <i class="fas fa-shield-alt"></i>
                        건전한 댓글 문화를 위해 부적절한 언어나 스팸성 내용은 자동으로 차단됩니다.
                    </div> -->
                    <div class="form-row">
                        <input type="text" id="commentAuthor" placeholder="닉네임 (2-20자)" maxlength="20" required>
                        <input type="password" id="commentPassword" placeholder="비밀번호 (숫자 4자리)" maxlength="4" minlength="4" pattern="[0-9]{4}" required>
                    </div>
                    <textarea id="commentContent" placeholder="댓글을 입력하세요..." maxlength="500" required></textarea>
                    <div class="form-actions">
                        <button id="submitComment" class="btn btn-primary">댓글 작성</button>
                        <span class="char-count">0/500</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 삭제 확인 모달 -->
        <div class="delete-modal" id="deleteModal" style="display: none;">
            <div class="modal-backdrop" onclick="closeDeleteModal()"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3>댓글 삭제</h3>
                    <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <p>삭제하려면 비밀번호를 입력하세요</p>
                    <input type="password" id="deletePassword" placeholder="숫자 4자리" maxlength="4" pattern="[0-9]{4}">
                    <div class="error-message" id="deleteError" style="display: none;"></div>
                </div>
                <div class="modal-actions">
                    <button id="confirmDelete" class="btn btn-danger">삭제</button>
                    <button onclick="closeDeleteModal()" class="btn btn-secondary">취소</button>
                </div>
            </div>
        </div>

        <!-- Related Posts -->
        <section id="relatedPosts" class="related-posts" style="display: none;">
            <div class="container">
                <h2>관련 포스트</h2>
                <div class="related-posts-grid" id="relatedPostsGrid">
                    <!-- 관련 포스트들이 동적으로 추가됩니다 -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer will be inserted by site-footer.js -->
    <div id="footer-placeholder"></div>

    <!-- Floating Actions are automatically loaded by floating-actions.js -->

    <!-- Scripts -->
    <script>
        // 모바일 사이드바 토글
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('mobileSidebar');
            sidebar.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 모바일 사이드바 닫기
        function closeMobileSidebar() {
            const sidebar = document.getElementById('mobileSidebar');
            sidebar.classList.remove('active');
            document.body.style.overflow = '';
        }

        // ESC 키로도 사이드바 닫기
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeMobileSidebar();
            }
        });
        
        // 헤더 색상 변경 (스크롤 시)
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            const sidebar = document.getElementById('mobileSidebar');
            
            if (window.scrollY > 100) {
                header.classList.add('header-dark');
                sidebar.classList.add('dark');
            } else {
                header.classList.remove('header-dark');
                sidebar.classList.remove('dark');
            }
        });
    </script>
    <!-- Header Component -->
    <script src="../scripts/shared/site-header.js"></script>
    <script src="../scripts/shared/site-footer.js"></script>
    
    <script src="../scripts/core/config.js"></script>
    <script src="../scripts/core/auth.js"></script>
    <script src="../scripts/shared/floating-actions.js?v=20260625"></script>
    <script src="../scripts/core/utils.js"></script>
    <script src="../scripts/core/sheets.js?v=20260625"></script>
    <script src="../scripts/features/comments.js"></script>
    <script src="../scripts/pages/post-page.js?v=20260625b"></script>
</body>
</html>
